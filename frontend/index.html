<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <meta name="theme-color" content="#ffcc00" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <link rel="manifest" href="/Pokemon-Web/manifest.json" />
  <link rel="apple-touch-icon" href="/Pokemon-Web/assets/ui/icon-192.png" />
  <title>Pokemon Web</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100dvh; height: 100%; background: #0f0f1a; overflow: hidden; touch-action: none;
      user-select: none; -webkit-user-select: none; -webkit-touch-callout: none;
      position: fixed; top: 0; left: 0; right: 0; bottom: 0;
      padding: env(safe-area-inset-top, 0px) env(safe-area-inset-right, 0px) env(safe-area-inset-bottom, 0px) env(safe-area-inset-left, 0px); }
    canvas { touch-action: none; user-select: none; -webkit-user-select: none; -webkit-touch-callout: none; display: block; }

    /* ── Mobile: canvas fills the entire viewport ── */
    @media (pointer: coarse) {
      canvas { width: 100% !important; height: 100% !important; }
    }

    /* ── Desktop chrome: background, frame, controls ── */
    @media (hover: hover) and (pointer: fine) {
      html, body {
        background: radial-gradient(ellipse at 50% 40%, #1a1a2e 0%, #0f0f1a 60%, #050510 100%);
      }
      canvas {
        border-radius: 6px;
        box-shadow: 0 0 0 2px rgba(255,204,0,0.25), 0 8px 32px rgba(0,0,0,0.6);
      }
    }
    #desktop-chrome {
      display: none; position: fixed; inset: 0;
      pointer-events: none; z-index: 900;
      font-family: 'Press Start 2P', 'Courier New', monospace;
    }
    @media (hover: hover) and (pointer: fine) {
      #desktop-chrome { display: block; }
    }
    #desktop-top-bar {
      position: absolute; top: 8px; left: 50%; transform: translateX(-50%);
      color: rgba(255,204,0,0.5); font-size: 10px; letter-spacing: 2px;
      text-transform: uppercase; pointer-events: none;
    }
    #desktop-controls {
      position: absolute; right: 12px; top: 12px;
      display: flex; gap: 6px; pointer-events: auto;
    }
    .desktop-btn {
      width: 32px; height: 32px; border-radius: 4px;
      background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.15);
      color: rgba(255,255,255,0.6); font-size: 14px; line-height: 32px; text-align: center;
      cursor: pointer; transition: background 120ms, color 120ms;
      font-family: monospace;
    }
    .desktop-btn:hover { background: rgba(255,204,0,0.15); color: #ffcc00; border-color: rgba(255,204,0,0.4); }
    #desktop-hints {
      position: absolute; bottom: 10px; left: 50%; transform: translateX(-50%);
      display: flex; gap: 18px; color: rgba(255,255,255,0.3); font-size: 9px;
      letter-spacing: 0.5px; pointer-events: none;
    }
    #desktop-hints kbd {
      display: inline-block; padding: 1px 5px; border-radius: 3px;
      background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.15);
      font-family: monospace; font-size: 9px; color: rgba(255,255,255,0.45);
    }
    #mobile-controls {
      position: fixed; left: 0; right: 0; bottom: 0;
      display: none; flex-direction: row; align-items: center; justify-content: space-between;
      padding: 8px 16px; padding-bottom: calc(8px + env(safe-area-inset-bottom, 0px));
      border-top: 1px solid rgba(255,255,255,0.08);
      touch-action: none; user-select: none; -webkit-user-select: none;
      z-index: 1000;
    }
    #joystick-zone {
      position: relative; flex: 1; height: 100%;
      touch-action: none;
    }
    #joystick-base {
      position: absolute; width: 120px; height: 120px;
      border-radius: 50%; background: rgba(51,68,102,0.35);
      border: 2px solid rgba(85,119,170,0.5);
      transform: translate(-50%,-50%); pointer-events: none; display: none;
    }
    #joystick-thumb {
      position: absolute; width: 48px; height: 48px;
      border-radius: 50%; background: rgba(85,153,204,0.6);
      transform: translate(-50%,-50%); pointer-events: none; display: none;
    }
    #action-buttons {
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      gap: 12px; padding: 0 20px;
    }
    .action-btn {
      width: 72px; height: 72px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      color: #fff; font-family: monospace; font-weight: bold; font-size: 24px;
      -webkit-tap-highlight-color: transparent; touch-action: none;
    }
    #btn-a { background: rgba(68,170,85,0.6); }
    #btn-b { background: rgba(170,68,68,0.6); }
    .action-btn.pressed { filter: brightness(1.5); }

    /* Landscape side-panel layout */
    @media (orientation: landscape) and (max-height: 500px) {
      #mobile-controls {
        position: fixed; top: 0; bottom: 0; left: 0; right: 0;
        flex-direction: row; align-items: stretch;
        padding: env(safe-area-inset-top, 0px) env(safe-area-inset-right, 0px) env(safe-area-inset-bottom, 0px) env(safe-area-inset-left, 0px);
        border-top: none; pointer-events: none;
      }
      #mobile-controls > * { pointer-events: auto; }
      #joystick-zone {
        width: 120px; flex: none; height: 100%;
        display: flex; align-items: center; justify-content: center;
        background: rgba(0,0,0,0.15);
      }
      #action-buttons {
        width: 120px; flex: none; height: 100%;
        display: flex; flex-direction: column; align-items: center; justify-content: center;
        background: rgba(0,0,0,0.15);
        margin-left: auto;
      }
      .action-btn { width: 64px; height: 64px; font-size: 22px; }
      /* Menu button in landscape */
      #mobile-menu-btn {
        position: absolute; top: 8px; right: 130px;
        width: 48px; height: 48px; border-radius: 6px;
        background: rgba(51,68,102,0.5); color: #fff;
        font-family: monospace; font-size: 18px; line-height: 48px; text-align: center;
        border: 1px solid rgba(85,119,170,0.4);
        -webkit-tap-highlight-color: transparent; touch-action: none;
      }
    }

    /* Rotate-to-landscape prompt */
    #rotate-prompt {
      display: none; position: fixed; inset: 0;
      flex-direction: column; align-items: center; justify-content: center;
      background: rgba(0,0,0,0.92); color: #fff; z-index: 9999;
      font-family: monospace; text-align: center; gap: 20px;
      padding: 24px; padding-top: calc(24px + env(safe-area-inset-top, 0px));
    }
    #rotate-prompt .rotate-icon {
      font-size: 64px; animation: rotate-hint 2s ease-in-out infinite;
    }
    @keyframes rotate-hint {
      0%, 100% { transform: rotate(0deg); }
      25% { transform: rotate(-30deg); }
      75% { transform: rotate(30deg); }
    }
    #rotate-prompt h2 { font-size: 20px; color: #ffcc00; }
    #rotate-prompt p { font-size: 14px; color: #aaa; max-width: 280px; }
    #rotate-prompt button {
      margin-top: 8px; padding: 10px 28px; border: 1px solid #ffcc00;
      background: transparent; color: #ffcc00; font-family: monospace;
      font-size: 16px; border-radius: 6px; cursor: pointer;
    }
    #rotate-prompt button:active { background: rgba(255,204,0,0.15); }

    /* iOS install-to-home-screen banner */
    #ios-install-prompt {
      display: none; position: fixed; bottom: 0; left: 0; right: 0;
      background: rgba(15,15,26,0.96); color: #fff; z-index: 9998;
      font-family: monospace; padding: 14px 16px;
      padding-bottom: calc(14px + env(safe-area-inset-bottom, 0px));
      border-top: 1px solid rgba(255,204,0,0.3);
      flex-direction: column; align-items: center; gap: 8px;
    }
    #ios-install-prompt .install-title {
      font-size: 15px; font-weight: bold; color: #ffcc00;
    }
    #ios-install-prompt .install-steps {
      font-size: 13px; color: #ccc; text-align: center; line-height: 1.5;
    }
    #ios-install-prompt .install-steps .share-icon {
      display: inline-block; font-size: 16px; vertical-align: middle;
    }
    #ios-install-prompt .install-actions {
      display: flex; gap: 12px; margin-top: 4px;
    }
    #ios-install-prompt button {
      padding: 8px 20px; border: 1px solid #ffcc00;
      background: transparent; color: #ffcc00; font-family: monospace;
      font-size: 14px; border-radius: 6px; cursor: pointer;
    }
    #ios-install-prompt button.install-dismiss {
      border-color: #666; color: #999;
    }
    #ios-install-prompt button:active { background: rgba(255,204,0,0.15); }
  </style>
</head>
<body>
  <!-- Portrait orientation prompt -->
  <div id="rotate-prompt">
    <div class="rotate-icon">📱</div>
    <h2>Rotate Your Device</h2>
    <p>This game is best played in landscape mode. Please rotate your phone horizontally.</p>
    <button id="rotate-dismiss">Continue Anyway</button>
  </div>

  <!-- iOS install-to-home-screen banner -->
  <div id="ios-install-prompt">
    <div class="install-title">Install for Full Screen</div>
    <div class="install-steps">
      Tap <span class="share-icon">⬆</span> Share, then "Add to Home Screen"
      for the best experience with no browser bars.
    </div>
    <div class="install-actions">
      <button class="install-dismiss" id="ios-install-dismiss">Not Now</button>
    </div>
  </div>

  <!-- Desktop chrome: title, fullscreen, keyboard hints -->
  <div id="desktop-chrome">
    <div id="desktop-top-bar">Pok&eacute;mon Web</div>
    <div id="desktop-controls">
      <div class="desktop-btn" id="btn-fullscreen" title="Toggle fullscreen (F11)">⛶</div>
      <div class="desktop-btn" id="btn-mute" title="Toggle sound (M)">🔊</div>
    </div>
    <div id="desktop-hints">
      <span><kbd>↑↓←→</kbd> Move</span>
      <span><kbd>Z</kbd> Confirm</span>
      <span><kbd>X</kbd> Back</span>
      <span><kbd>Enter</kbd> Menu</span>
      <span><kbd>M</kbd> Mute</span>
      <span><kbd>F11</kbd> Fullscreen</span>
    </div>
  </div>

  <div id="mobile-controls">
    <div id="joystick-zone">
      <div id="joystick-base"></div>
      <div id="joystick-thumb"></div>
    </div>
    <div id="action-buttons">
      <div id="btn-a" class="action-btn">A</div>
      <div id="btn-b" class="action-btn">B</div>
    </div>
    <div id="mobile-menu-btn">☰</div>
  </div>
  <!-- Colorblind filters (applied via CSS on canvas) -->
  <svg style="position:absolute;width:0;height:0">
    <defs>
      <filter id="protanopia-filter">
        <feColorMatrix type="matrix" values="0.567,0.433,0,0,0 0.558,0.442,0,0,0 0,0.242,0.758,0,0 0,0,0,1,0"/>
      </filter>
      <filter id="deuteranopia-filter">
        <feColorMatrix type="matrix" values="0.625,0.375,0,0,0 0.7,0.3,0,0,0 0,0.3,0.7,0,0 0,0,0,1,0"/>
      </filter>
    </defs>
  </svg>
  <script type="module" src="/src/main.ts"></script>
  <script>
    // Prevent double-tap zoom and pinch zoom on iOS/Android
    document.addEventListener('dblclick', function(e) { e.preventDefault(); }, { passive: false });
    document.addEventListener('gesturestart', function(e) { e.preventDefault(); }, { passive: false });
    document.addEventListener('gesturechange', function(e) { e.preventDefault(); }, { passive: false });
    document.addEventListener('gestureend', function(e) { e.preventDefault(); }, { passive: false });
    // Block context menu (long-press copy)
    document.addEventListener('contextmenu', function(e) { e.preventDefault(); });
    // Dismiss rotate prompt
    var dismissBtn = document.getElementById('rotate-dismiss');
    if (dismissBtn) {
      dismissBtn.addEventListener('click', function() {
        var overlay = document.getElementById('rotate-prompt');
        if (overlay) overlay.style.display = 'none';
        try { sessionStorage.setItem('pokemon-web-rotate-dismissed', '1'); } catch(e) {}
      });
    }
    // ── Desktop fullscreen toggle ──
    var fsBtn = document.getElementById('btn-fullscreen');
    if (fsBtn) {
      fsBtn.addEventListener('click', function() {
        if (!document.fullscreenElement) {
          document.documentElement.requestFullscreen().catch(function(){});
        } else {
          document.exitFullscreen().catch(function(){});
        }
      });
    }
    document.addEventListener('fullscreenchange', function() {
      var btn = document.getElementById('btn-fullscreen');
      if (btn) btn.textContent = document.fullscreenElement ? '⛶' : '⛶';
      if (btn) btn.title = document.fullscreenElement ? 'Exit fullscreen (F11)' : 'Toggle fullscreen (F11)';
    });
    // F11 fullscreen shortcut (prevent browser default)
    document.addEventListener('keydown', function(e) {
      if (e.key === 'F11') {
        e.preventDefault();
        if (!document.fullscreenElement) {
          document.documentElement.requestFullscreen().catch(function(){});
        } else {
          document.exitFullscreen().catch(function(){});
        }
      }
    });
    // ── Desktop mute toggle ──
    var muteBtn = document.getElementById('btn-mute');
    var isMuted = localStorage.getItem('pokemon-web-muted') === '1';
    function updateMuteBtn() {
      if (muteBtn) muteBtn.textContent = isMuted ? '🔇' : '🔊';
    }
    updateMuteBtn();
    if (muteBtn) {
      muteBtn.addEventListener('click', function() {
        isMuted = !isMuted;
        localStorage.setItem('pokemon-web-muted', isMuted ? '1' : '0');
        updateMuteBtn();
        // Dispatch event for AudioManager to pick up
        window.dispatchEvent(new CustomEvent('pokemon-mute-toggle', { detail: { muted: isMuted } }));
      });
    }
    document.addEventListener('keydown', function(e) {
      if (e.key === 'm' || e.key === 'M') {
        if (e.target && (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA')) return;
        isMuted = !isMuted;
        localStorage.setItem('pokemon-web-muted', isMuted ? '1' : '0');
        updateMuteBtn();
        window.dispatchEvent(new CustomEvent('pokemon-mute-toggle', { detail: { muted: isMuted } }));
      }
    });
  </script>
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('/Pokemon-Web/sw.js').catch(() => {});
      });
    }
  </script>
</body>
</html>
